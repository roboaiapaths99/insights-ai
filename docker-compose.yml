version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: academics_insights_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-academics_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d academics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: academics_insights_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/academics_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: '["http://insights.agpkacademy.in", "https://insights.agpkacademy.in"]'

  frontend:
    build: ./frontend
    container_name: academics_insights_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      API_URL: http://insights.agpkacademy.in/api
    depends_on:
      - backend

volumes:
  postgres_data:
